name: mst-rag-admin
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pandas
  - pyyaml
  - tqdm
  - requests
  - streamlit
  - pip:
      - chromadb
      - pymupdf
      - pymupdf4llm
      - tiktoken
      - sentence-transformers
      # transformers が画像系サブモジュールを import する際に torchvision を要求することがある（リランク利用時など）
      - torchvision
      - mcp
      - google-api-python-client
      - google-auth
      - google-auth-httplib2